<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Solicitud | Turnosmart</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --main-bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--main-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Botón Volver con estilo refinado */
        .btn-back {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-back:hover {
            color: var(--primary-color);
            transform: translateX(-4px);
        }

        /* Tarjeta de Formulario estilo Captura 2026 */
        .form-card {
            border: none;
            border-radius: 24px;
            background: white;
            box-shadow: var(--card-shadow);
            padding: 3rem !important;
        }

        .header h2 {
            font-weight: 700;
            letter-spacing: -0.025em;
            color: var(--text-main);
        }

        /* Estilo de Inputs y Labels */
        .form-label {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.6rem;
            margin-left: 0.2rem;
        }

        .form-control, .form-select {
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border-color);
            font-size: 0.95rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #ffffff;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }

        /* Botón Principal */
        .btn-primary {
            border-radius: 14px;
            padding: 1rem;
            font-weight: 600;
            background-color: var(--primary-color);
            border: none;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        /* Decoración de sección */
        .section-step {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .step-number {
            width: 32px;
            height: 32px;
            background: #eff6ff;
            color: var(--primary-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .form-card { padding: 2rem 1.5rem !important; }
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <!-- Botón Volver -->
            <a th:href="@{/cliente/dashboard}" class="btn-back text-decoration-none mb-4">
                <i class="bi bi-arrow-left"></i> Volver al Panel
            </a>

            <div class="card form-card shadow-sm">
                <div class="header mb-5">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div class="step-number"><i class="bi bi-file-earmark-text"></i></div>
                        <h2 class="mb-0">Nueva Solicitud</h2>
                    </div>
                    <p class="text-muted ps-5">Completa los detalles para agendar tu trámite notarial.</p>
                </div>

                <!-- Formulario vinculado a AppointmentRequestDTO -->
                <form th:action="@{/appointments/save}" th:object="${appointmentRequest}" method="post">
                    <div class="row g-4">

                        <!-- 1. Trámite -->
                        <div class="col-12">
                            <label class="form-label">Tipo de Trámite</label>
                            <select th:field="*{procedureTypeId}" class="form-select" required>
                                <option value="">Seleccione un servicio...</option>
                                <option th:each="p : ${procedimientos}"
                                        th:value="${p.id}"
                                        th:text="|${p.name} — S/ ${p.price != null ? p.price : '0.00'}|"></option>
                            </select>
                        </div>

                        <!-- Selección de Abogado -->
                        <div class="col-12">
                            <label class="form-label">Especialista Preferido</label>
                            <select th:field="*{lawyerId}" class="form-select">
                                <option value="">Cualquier abogado disponible</option>
                                <option th:each="a : ${abogados}"
                                        th:value="${a.id}"
                                        th:text="${a.user != null ? a.user.firstName + ' ' + a.user.lastName : 'Especialista sin datos'}">
                                </option>
                            </select>
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Observaciones Adicionales</label>
                            <textarea th:field="*{notes}" class="form-control" rows="3" placeholder="¿Algún detalle extra que debamos saber?"></textarea>
                        </div>

                        <div class="col-12 mt-5">
                            <button type="submit" class="btn btn-primary w-100 shadow-sm">
                                <i class="bi bi-send-check me-2"></i> Enviar Solicitud de Trámite
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4">
                <p class="small text-muted">
                    <i class="bi bi-info-circle me-1"></i> Una vez enviada, podrás revisar el estado desde tu panel principal.
                </p>
            </div>
        </div>
    </div>
</div>

<script>
    // Bloquear fechas pasadas para consistencia en la UX
    const input = document.getElementById('dateInput');
    if(input) {
        input.min = new Date().toISOString().split("T")[0];
    }
</script>

</body>
</html>
