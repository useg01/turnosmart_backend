<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Turnosmart</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --main-bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        body {
            background-color: var(--main-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Tarjeta de Perfil Estilo SaaS */
        .card-perfil {
            border: none;
            border-radius: 24px;
            background: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* Avatar / Icono */
        .profile-icon-wrapper {
            width: 84px;
            height: 84px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
            color: white;
            border-radius: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
            margin-bottom: 1.5rem;
        }

        /* Títulos */
        .fw-bold { font-weight: 700 !important; letter-spacing: -0.02em; }

        /* Inputs y Labels */
        .form-label {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Input Readonly (DNI) */
        .form-control-readonly {
            background-color: #f1f5f9 !important;
            border-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        /* Divider */
        .section-divider {
            color: var(--primary-color);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1.5rem 0;
        }
        .section-divider::after { content: ""; height: 1px; flex-grow: 1; background: var(--border-color); }

        /* Botones */
        .btn-save {
            background-color: var(--primary-color);
            border: none;
            padding: 0.8rem;
            border-radius: 14px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
            transition: all 0.3s;
        }
        .btn-save:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.8rem;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-cancel:hover { background: #f8fafc; color: var(--text-main); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="card card-perfil p-4 p-md-5">
                <!-- Encabezado Perfil -->
                <div class="text-center">
                    <div class="profile-icon-wrapper">
                        <i class="bi bi-person-circle fs-1"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Mi Perfil</h3>
                    <p class="text-muted small mb-4">Gestiona tu información personal y de contacto</p>
                </div>

                <form th:action="@{/cliente/perfil/guardar}" th:object="${usuario}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="section-divider">Datos Personales</div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{firstName}" required placeholder="Tu nombre">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control" th:field="*{lastName}" required placeholder="Tu apellido">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">DNI <small class="text-muted ms-1">(Bloqueado)</small></label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted" style="border-radius: 12px 0 0 12px;"><i class="bi bi-card-text"></i></span>
                            <input type="text" class="form-control form-control-readonly border-start-0" th:field="*{dni}" readonly style="border-radius: 0 12px 12px 0;">
                        </div>
                    </div>

                    <div class="section-divider">Contacto</div>

                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted" style="border-radius: 12px 0 0 12px;"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control border-start-0" th:field="*{email}" required placeholder="correo@ejemplo.com" style="border-radius: 0 12px 12px 0;">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Teléfono / WhatsApp</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted" style="border-radius: 12px 0 0 12px;"><i class="bi bi-whatsapp"></i></span>
                            <input type="text" class="form-control border-start-0" th:field="*{phone}" placeholder="+51 999 999 999" style="border-radius: 0 12px 12px 0;">
                        </div>
                    </div>

                    <!-- Botonera -->
                    <div class="d-grid gap-3 mt-4">
                        <button type="submit" class="btn btn-save text-white fw-bold">
                            <i class="bi bi-check-circle me-2"></i>Guardar Cambios
                        </button>
                        <a href="/cliente/dashboard" class="btn btn-cancel">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>

            <!-- Ayuda / Info Extra -->
            <p class="text-center text-muted small mt-4">
                <i class="bi bi-shield-check text-primary me-1"></i> Tus datos están protegidos por Turnosmart
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
