<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TurnoSmart</title>
    <!-- Iconos para consistencia visual -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --main-bg: #f8fafc; /* Gris azulado muy claro de la captura */
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border-color: #e2e8f0;
            /* Sombra multinivel idéntica a la del dashboard */
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--main-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        .login-card {
            background: var(--white);
            padding: 3.5rem 2.5rem;
            border-radius: 24px; /* Bordes suaves como en el Módulo de Gestión */
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        /* Icono de marca circular */
        .brand-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary-color) 0%, #3b82f6 100%);
            color: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.8rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.25);
        }

        h2 {
            color: var(--text-main);
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 0.2rem;
        }

        input, select {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 12px; /* Redondeado tipo SaaS */
            font-size: 0.95rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--white);
            color: var(--text-main);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer-link {
            margin-top: 2rem;
            display: block;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* Alertas estilizadas */
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid transparent;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border-color: #bbf7d0;
        }
        .alert-danger {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-logo">
        <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h2>Bienvenido</h2>
    <p class="subtitle">Ingresa tus credenciales para acceder</p>

    <!-- Alerta de Error -->
    <div th:if="${error}" class="alert alert-danger">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${error}">Credenciales incorrectas</span>
    </div>

    <!-- Alerta de Éxito -->
    <div th:if="${param.success}" class="alert alert-success">
        <i class="bi bi-check-circle-fill"></i>
        ¡Registro completado con éxito!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" name="email" placeholder="ejemplo@correo.com" required />
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required />
        </div>

        <div class="form-group">
            <label>Tipo de Acceso</label>
            <select name="interfaz">
                <option value="CLIENTE">Soy Cliente</option>
                <option value="ABOGADO">Soy Abogado</option>
                <option value="ADMIN">Soy Administrador</option>
            </select>
        </div>

        <button type="submit">Iniciar Sesión</button>
    </form>

    <a href="/registro" class="footer-link">¿No tienes cuenta? Regístrate aquí</a>
</div>

</body>
</html>
