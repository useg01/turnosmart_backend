<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TurnoSmart</title>
    <!-- Iconos para consistencia visual -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Colores de la Notaría TurnoSmart basados en el diseño elegante */
            --primary-color: #2b4c7e; /* Azul notarial sobrio */
            --primary-hover: #1a3256;
            --btn-blue: #3b66a6;
            --input-bg: #f4f4f6;
            --text-main: #1c2434;
            --text-muted: #64748b;
            --white: #ffffff;
            --border-color: #cbd5e1;
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Fondo con gradiente azul y círculos difuminados abstractos de la captura original */
            background: linear-gradient(135deg, #2b7fff 0%, #1a56cc 50%, #5c9eff 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 1rem;
        }

        /* Elementos decorativos de fondo (burbujas azules de la captura) */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            filter: blur(30px);
            z-index: 0;
        }
        body::before { width: 300px; height: 300px; top: 10%; left: 5%; }
        body::after { width: 400px; height: 400px; bottom: 5%; right: 10%; }

        /* Estructura del Contenedor Principal (Caja Dividida Estilo ADEX) */
        .login-container {
            position: relative;
            z-index: 10;
            background: var(--white);
            border-radius: 30px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 1050px;
            height: 520px;
            display: table; /* Usamos estructura de tabla para compatibilidad de renderizado limpio */
            table-layout: fixed;
            overflow: hidden;
        }

        /* Panel Izquierdo: Formulario de Login */
        .login-form-side {
            display: table-cell;
            width: 46%;
            background: var(--white);
            vertical-align: middle;
            padding: 2.5rem 3.5rem;
            position: relative;
            z-index: 2;
        }

        /* Panel Derecho: Imagen Corporativa */
        .login-image-side {
            display: table-cell;
            width: 54%;
            position: relative;
            background-image: url('https://images.unsplash.com/photo-1560250097-0b93528c311a?q=80&w=1200&auto=format&fit=crop'); /* Imagen premium de abogados en oficina notarial */
            background-size: cover;
            background-position: center center;
            vertical-align: bottom;
        }

        /* Efecto de división de ola (Wave) idéntico a la captura */
        .login-form-side::after {
            content: "";
            position: absolute;
            top: 0;
            right: -60px;
            width: 120px;
            height: 100%;
            background: var(--white);
            border-radius: 100% 0% 0% 100% / 50% 0% 0% 50%;
            z-index: 1;
        }

        /* Marca y Logotipo Notarial */
        .brand-header {
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .brand-logo-icon {
            font-size: 2.2rem;
            color: var(--primary-color);
            line-height: 1;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
            margin: 0;
        }

        .brand-subtitle {
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 600;
            margin-top: 2px;
        }

        /* Títulos Internos */
        h2 {
            position: relative;
            z-index: 5;
            color: var(--text-main);
            font-size: 1.6rem;
            margin: 0 0 0.25rem 0;
            font-weight: 700;
        }

        p.subtitle {
            position: relative;
            z-index: 5;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* Formulario e Inputs estilizados como la captura original */
        form {
            position: relative;
            z-index: 5;
        }

        .mb-3 {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            border: none;
            border-bottom: 1px solid var(--border-color); /* Estilo de línea sutil */
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: var(--input-bg);
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            background-color: #eef2f6;
            border-bottom: 2px solid var(--primary-color);
        }

        /* Marcadores de posición simulando las etiquetas integradas de la captura */
        .form-control::placeholder {
            color: #94a3b8;
        }

        /* Etiquetas invisibles visualmente pero presentes para estructura */
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        /* Botón Iniciar Sesión idéntico (Azul difuminado con curvas suaves) */
        .btn-primary {
            width: 100%;
            padding: 0.95rem;
            background-color: #6ea4f7; /* Tono azul claro de la captura original para el botón */
            background: linear-gradient(to right, #6ea4f7, #538ee6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 10px rgba(83, 142, 230, 0.3);
        }

        .btn-primary:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
        }

        .footer-link {
            position: relative;
            z-index: 5;
            margin-top: 1.5rem;
            display: inline-block;
            color: var(--btn-blue);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        /* Tarjeta flotante translúcida sobre la foto (Glassmorphism de la captura) */
        .glass-overlay-card {
            position: absolute;
            bottom: 35px;
            left: 5%;
            right: 5%;
            background: rgba(139, 67, 85, 0.65); /* Tono rojizo/marrón traslúcido elegante */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.2rem 2rem;
            color: var(--white);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
        }

        .glass-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
            letter-spacing: 0.03em;
        }

        .glass-desc {
            font-size: 0.8rem;
            opacity: 0.9;
        }

        /* Alertas estilizadas compactas */
        .alert {
            position: relative;
            z-index: 5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .alert-success {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .alert-danger {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

<div class="login-container">

    <!-- LADO IZQUIERDO: FORMULARIO -->
    <div class="login-form-side">

        <!-- Encabezado de marca con Logo de Notaría -->
        <div class="brand-header">
            <div class="brand-logo-icon">
                <i class="bi bi-balance-scale"></i> <!-- Icono de la justicia / notarial -->
            </div>
            <div class="brand-text">
                <span class="brand-title">TurnoSmart</span>
                <span class="brand-subtitle">Servicios Notariales Digitales</span>
            </div>
        </div>

        <h2>Bienvenido</h2>
        <p class="subtitle">Accede a todos tus trámites desde un solo lugar.</p>

        <!-- Alerta de Error (Lógica intacta) -->
        <div th:if="${error}" class="alert alert-danger">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span th:text="${error}">Credenciales incorrectas</span>
        </div>

        <!-- Alerta de Éxito (Lógica intacta) -->
        <div th:if="${param.success}" class="alert alert-success">
            <i class="bi bi-check-circle-fill"></i>
            ¡Registro completado con éxito!
        </div>

        <!-- Formulario (Estructura interna y lógica intacta) -->
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" name="email" class="form-control" placeholder="ejemplo@notaria.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>
        </form>

        <a href="/registro" class="footer-link">¿No tienes cuenta? Regístrate aquí</a>
    </div>

    <!-- LADO DERECHO: IMAGEN Y BANNER FLOTANTE -->
    <div class="login-image-side">
        <!-- Cuadro con efecto desenfoque (Glassmorphic) de la captura original -->
        <div class="glass-overlay-card">
            <div class="glass-title">Portal Clientes TurnoSmart</div>
            <div class="glass-desc">Acceso seguro a tus firmas, actas y escrituras virtuales.</div>
        </div>
    </div>

</div>

</body>
</html>
