<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Turnos | Turnosmart</title>

    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --main-bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--main-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        /* Navbar Sofisticada */
        .navbar-custom {
            background-color: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 0;
        }
        .navbar-brand-custom {
            color: var(--primary-color) !important;
            font-weight: 700;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        /* Contenedores con Elevación */
        .calendar-container, .sidebar-calendar {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        /* FullCalendar Custom Styling */
        #calendar { max-height: 750px; }

        .fc { --fc-border-color: #f1f5f9; --fc-today-bg-color: #eff6ff; }
        .fc .fc-toolbar-title { font-size: 1.25rem; font-weight: 700; color: var(--text-main); }

        /* Botones de FullCalendar estilo Bootstrap Moderno */
        .fc .fc-button-primary {
            background-color: white;
            border: 1px solid #e2e8f0;
            color: var(--text-main);
            text-transform: capitalize;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: none !important;
        }
        .fc .fc-button-primary:hover { background-color: #f8fafc; border-color: #cbd5e1; color: var(--primary-color); }
        .fc .fc-button-active { background-color: var(--primary-color) !important; border-color: var(--primary-color) !important; color: white !important; }

        .fc-event { cursor: pointer; border-radius: 6px; border: none; padding: 3px 6px; font-weight: 500; font-size: 0.85rem; }

        /* Sidebar Elements */
        .status-pill { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .legend-item { font-size: 0.9rem; color: var(--text-main); font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; }

        .btn-primary-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary-custom:hover { background-color: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }

        .instruction-box {
            background-color: #f0f7ff;
            border: 1px solid #e0efff;
            border-radius: 12px;
            padding: 15px;
            color: #1e40af;
        }

        /* Modales */
        .modal-content { border-radius: 20px; border: none; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { border-bottom: 1px solid #f1f5f9; padding: 20px 25px; }
        .modal-title { font-weight: 700; }
        .modal-body { padding: 25px; }
    </style>
</head>
<body>

<nav class="navbar navbar-custom mb-5">
    <div class="container-fluid px-4">
        <a class="navbar-brand-custom" th:href="@{/admin/dashboard}">
            <i class="bi bi-arrow-left-short fs-3 me-1"></i> Turnosmart <span class="text-muted ms-2 fw-normal fs-6">| Gestión de Citas</span>
        </a>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row g-4">
        <!-- Sidebar -->
        <div class="col-lg-3">
            <div class="sidebar-calendar">
                <h5 class="fw-bold mb-4">Panel de Agenda</h5>

                <div class="mb-4">
                    <label class="text-muted small fw-bold text-uppercase mb-3 d-block">Leyenda de estados</label>
                    <div class="legend-item">
                        <span class="status-pill bg-success"></span> Confirmados
                    </div>
                    <div class="legend-item">
                        <span class="status-pill bg-warning"></span> Pendientes
                    </div>
                    <div class="legend-item">
                        <span class="status-pill bg-danger"></span> Cancelados
                    </div>
                </div>

                <hr class="my-4 opacity-50">

                <div class="d-grid">
                    <a th:href="@{/tramites/nuevo}" class="btn btn-primary-custom">
                        <i class="bi bi-plus-lg me-2"></i> Nuevo Turno
                    </a>
                </div>

                <div class="mt-4 instruction-box">
                    <h6 class="fw-bold small mb-2"><i class="bi bi-lightbulb me-2"></i>Tip de gestión</h6>
                    <p class="small mb-0 opacity-75">Selecciona un rango horario directamente en el calendario para agendar una cita rápida.</p>
                </div>
            </div>
        </div>

        <!-- Calendario -->
        <div class="col-lg-9">
            <div class="calendar-container">
                <div id="calendar"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Detalles -->
<div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-info-circle me-2 text-primary"></i>Detalles del Turno</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="text-muted small text-uppercase fw-bold d-block mb-1">Cliente</label>
                    <div class="h6 fw-bold" id="modalClient"></div>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="text-muted small text-uppercase fw-bold d-block mb-1">Trámite</label>
                        <div class="badge bg-primary bg-opacity-10 text-primary" id="modalType">Trámite</div>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="text-muted small text-uppercase fw-bold d-block mb-1">Hora programada</label>
                        <div class="fw-500" id="modalTime"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer bg-light bg-opacity-50 border-0">
                <button type="button" class="btn btn-light fw-bold px-4" data-bs-dismiss="modal">Cerrar</button>
                <button type="button" class="btn btn-primary fw-bold px-4">Gestionar</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const calendarEl = document.getElementById('calendar');
        const eventModal = new bootstrap.Modal(document.getElementById('eventModal'));

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'timeGridWeek',
            locale: 'es',
            slotMinTime: '08:00:00',
            slotMaxTime: '19:00:00',
            allDaySlot: false,
            expandRows: true,
            headerToolbar: {
                left: 'prev,next today',
                center: 'title',
                right: 'dayGridMonth,timeGridWeek,timeGridDay'
            },
            buttonText: {
                today: 'Hoy',
                month: 'Mes',
                week: 'Semana',
                day: 'Día'
            },
            selectable: true,
            selectMirror: true,
            events: '/api/turnos/eventos',

            select: function(info) {
                const fechaHora = info.startStr;
                if (confirm('¿Desea programar un nuevo turno el día ' + new Date(fechaHora).toLocaleString() + '?')) {
                    window.location.href = '/tramites/nuevo?fecha=' + encodeURIComponent(fechaHora);
                }
                calendar.unselect();
            },

            eventClick: function(info) {
                document.getElementById('modalClient').innerText = info.event.title;
                document.getElementById('modalTime').innerText = info.event.start.toLocaleString('es-ES', { dateStyle: 'full', timeStyle: 'short' });
                // Aquí podrías asignar el tipo de trámite si viene en el objeto extendido de FullCalendar
                // document.getElementById('modalType').innerText = info.event.extendedProps.tipo;
                eventModal.show();
            }
        });

        calendar.render();
    });
</script>
</body>
</html>
