<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reportes Globales | Turnosmart Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .main-content { padding: 2rem; }
        .chart-container { background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .stat-card { border: none; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <main class="col-12 main-content">
            <h2 class="fw-bold mb-4">Reportes Globales</h2>

            <!-- Fila de Indicadores -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card p-3 border-start border-primary border-5">
                        <span class="text-muted small fw-bold">TOTAL TRÁMITES</span>
                        <h2 class="fw-bold mb-0" th:text="${totalTramites ?: 0}">0</h2>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card p-3 border-start border-success border-5">
                        <span class="text-muted small fw-bold">RECAUDACIÓN</span>
                        <h2 class="fw-bold mb-0 text-success" th:text="'S/ ' + ${recaudacionTotal ?: 0}">S/ 0</h2>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="chart-container">
                        <h5 class="fw-bold mb-4">Distribución por Estados</h5>
                        <canvas id="statusChart"></canvas>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="chart-container">
                        <h5 class="fw-bold mb-4">Trámites más Solicitados</h5>
                        <canvas id="typesChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- EL TRUCO PARA THYMELEAF ESTÁ AQUÍ -->
<script th:inline="javascript">
    /*<![CDATA[*/

    // 1. Gráfico de Estados
    const ctxStatus = document.getElementById('statusChart').getContext('2d');
    new Chart(ctxStatus, {
        type: 'doughnut',
        data: {
            labels: ['Pendientes', 'En Proceso', 'Finalizados', 'Cancelados'],
            datasets: [{
                // Inyectamos valores de Spring; si son nulos, ponemos 0
                data: [
                    /*[[${countPendientes ?: 0}]]*/ 0,
                    /*[[${countProceso ?: 0}]]*/ 0,
                    /*[[${countFinalizados ?: 0}]]*/ 0,
                    /*[[${countCancelados ?: 0}]]*/ 0
                ],
                backgroundColor: ['#f59e0b', '#3b82f6', '#10b981', '#ef4444']
            }]
        }
    });

    // 2. Gráfico de Tipos de Trámite
    const ctxTypes = document.getElementById('typesChart').getContext('2d');

    // Usamos comentarios de Thymeleaf para que el JS sea válido incluso si falla la inyección
    const nombresLabels = /*[[${nombresTramites}]]*/ ['Sin datos'];
    const cantidadesData = /*[[${cantidadesTramites}]]*/ [0];

    new Chart(ctxTypes, {
        type: 'bar',
        data: {
            labels: nombresLabels,
            datasets: [{
                label: 'Cantidad',
                data: cantidadesData,
                backgroundColor: '#6366f1'
            }]
        }
    });

    /*]]>*/
</script>

</body>
</html>
