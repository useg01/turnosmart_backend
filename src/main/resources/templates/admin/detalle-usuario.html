<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Cliente - Turnosmart</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-dark: #1e293b;
            --accent-color: #2563eb;
            --bg-main: #f8fafc;
            --text-main: #334155;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-main);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        /* Botón de regreso minimalista */
        .btn-back {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
            margin-bottom: 2rem;
        }
        .btn-back:hover {
            color: var(--accent-color);
            transform: translateX(-3px);
        }

        /* Tarjetas sofisticadas */
        .card-profile {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* Avatar Section */
        .avatar-container {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .status-pill {
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .status-active { background-color: #dcfce7; color: #166534; }
        .status-inactive { background-color: #fee2e2; color: #991b1b; }

        /* Información General */
        .info-header {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 1rem;
            margin-bottom: 1.5rem;
        }

        .label-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .value-text {
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary-dark);
        }

        /* Roles */
        .role-badge {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
        }

        /* Alerta estilizada */
        .alert-future {
            background: #eff6ff;
            border: 1px solid #dbeafe;
            color: #1d4ed8;
            border-radius: 12px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <!-- Botón Volver -->
    <a th:href="@{/admin/usuarios}" class="btn-back">
        <i class="bi bi-arrow-left-short fs-4"></i> Volver a la lista de usuarios
    </a>

    <div class="row g-4">
        <!-- Columna Perfil (Izquierda) -->
        <div class="col-md-4">
            <div class="card card-profile p-4 text-center">
                <div class="avatar-container">
                    <!-- Muestra la primera letra del nombre como avatar elegante -->
                    <span th:text="${usuario.firstName.substring(0,1)}">U</span>
                </div>

                <h4 class="fw-bold mb-1" th:text="${usuario.firstName + ' ' + usuario.lastName}">Nombre Cliente</h4>
                <p class="text-muted small mb-3" th:text="${usuario.email}">email@ejemplo.com</p>

                <div class="d-flex justify-content-center">
                    <span th:class="${usuario.enabled} ? 'status-pill status-active' : 'status-pill status-inactive'"
                          th:text="${usuario.enabled} ? 'Activo' : 'Inactivo'">
                    </span>
                </div>
            </div>
        </div>

        <!-- Columna Detalles (Derecha) -->
        <div class="col-md-8">
            <div class="card card-profile p-4 p-md-5">
                <div class="info-header d-flex align-items-center">
                    <i class="bi bi-person-lines-fill me-2 text-accent fs-5"></i>
                    <h5 class="mb-0 fw-bold">Información General</h5>
                </div>

                <div class="row gy-4">
                    <div class="col-sm-6">
                        <div class="label-text">ID de Usuario</div>
                        <div class="value-text" th:text="${usuario.id}">001</div>
                    </div>

                    <div class="col-sm-6">
                        <div class="label-text">Teléfono de Contacto</div>
                        <div class="value-text">
                            <i class="bi bi-telephone me-1 text-muted"></i>
                            <span th:text="${usuario.phone != null ? usuario.phone : 'No registrado'}"></span>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="label-text mb-2">Permisos y Roles</div>
                        <div class="d-flex flex-wrap gap-2">
                            <span th:each="rol : ${usuario.roles}"
                                  class="role-badge"
                                  th:text="${rol.name}">ADMIN</span>
                        </div>
                    </div>
                </div>

                <!-- Historial informativo -->
                <div class="alert alert-future mt-5 d-flex align-items-center">
                    <i class="bi bi-clock-history me-3 fs-5"></i>
                    <div>
                        <strong>Módulo en desarrollo:</strong> Pronto podrás visualizar aquí el historial completo de trámites y turnos solicitados por este usuario.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
