<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - TurnoSmart</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-main: #1e293b;
            --white: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .profile-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        .info-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.4rem;
        }
        .data-field {
            padding: 0.75rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            color: var(--text-main);
        }
        .readonly-field {
            background: #f1f5f9; /* Color más grisáceo para indicar que no se toca */
            color: #94a3b8;
            cursor: not-allowed;
        }
        .btn-edit {
            display: inline-block;
            width: 100%;
            padding: 0.85rem;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 0.75rem;
            text-align: center;
            font-weight: 600;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="profile-card">
    <h2 style="margin-top:0">Configuración de Perfil</h2>

    <div class="info-group">
        <label>Documento Nacional de Identidad (DNI)</label>
        <div class="data-field readonly-field">
            <span th:text="${user.dni}">12345678</span>
            <small style="float:right">🔒 Protegido</small>
        </div>
    </div>

    <div class="info-group">
        <label>Nombre Completo</label>
        <div class="data-field" th:text="${user.firstName + ' ' + user.lastName}">Juan Pérez</div>
    </div>

    <div class="info-group">
        <label>Correo Electrónico</label>
        <div class="data-field" th:text="${user.email}">juan@email.com</div>
    </div>

    <div class="info-group">
        <label>Teléfono</label>
        <div class="data-field" th:text="${user.phone ?: 'No registrado'}">999888777</div>
    </div>

    <a th:href="@{'/usuario/perfil/editar/' + ${user.id}}" class="btn-edit">
        Editar perfil
    </a>
</div>

</body>
</html>
