<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Recurso No Encontrado | Turnosmart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --main-bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            background-color: var(--main-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .error-card {
            background: white;
            border-radius: 28px;
            padding: 4rem 3rem;
            box-shadow: var(--card-shadow);
            border: none;
            text-align: center;
            max-width: 550px;
            width: 100%;
        }

        .gavel-icon {
            font-size: 4.5rem;
            color: var(--primary-color);
            display: inline-block;
            animation: pound 2s ease-in-out infinite alternate;
            margin-bottom: 1.5rem;
        }

        /* Animación sutil de martillo notarial */
        @keyframes pound {
            0% { transform: rotate(0deg); }
            30% { transform: rotate(-20deg); }
            45% { transform: rotate(15deg); }
            60% { transform: rotate(-5deg); }
            75% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .error-title {
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-main);
            margin-bottom: 1rem;
        }

        .btn-home {
            border-radius: 14px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            background-color: var(--primary-color);
            border: none;
            transition: all 0.2s;
        }

        .btn-home:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.25);
        }

        .legal-footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 3rem;
            border-top: 1px solid #f1f5f9;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center px-3">
    <div class="card error-card">

        <div class="gavel-icon">
            <i class="bi bi-gavel"></i>
        </div>

        <div class="error-code">404</div>

        <h2 class="error-title">¡Fuera de Jurisdicción!</h2>

        <p class="text-muted mb-5 px-3">
            El recurso o caso que intenta apelar no se encuentra en nuestros archivos notariales.
            Es posible que la dirección haya expirado o la evidencia haya sido removida del sistema.
        </p>

        <div class="d-grid gap-2 col-md-8 mx-auto">
            <a th:href="@{/}" class="btn btn-primary btn-home shadow-sm">
                <i class="bi bi-arrow-left-circle me-2"></i> Regresar al Inicio
            </a>
        </div>

        <div class="legal-footer">
            <i class="bi bi-shield-shaded me-1"></i> Turnosmart Legal S.A. &copy; 2026 — Todos los derechos reservados.
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
