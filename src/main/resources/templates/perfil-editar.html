<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - TurnoSmart</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-main: #1e293b;
            --white: #ffffff;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .edit-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        .field-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            box-sizing: border-box;
            font-size: 0.95rem;
        }
        /* Estilo para el DNI bloqueado */
        .readonly-input {
            background-color: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            border-style: dashed;
        }
        .btn-save {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="edit-card">
    <h2 style="margin-top:0">Editar Información</h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">Actualice sus datos de contacto.</p>

    <form th:action="@{/usuario/perfil/update}" th:object="${user}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="field-group">
            <label>DNI (No modificable)</label>
            <input type="text" th:field="*{dni}" class="readonly-input" readonly />
        </div>

        <div class="field-group">
            <label>Nombres</label>
            <input type="text" th:field="*{firstName}" required />
        </div>

        <div class="field-group">
            <label>Apellidos</label>
            <input type="text" th:field="*{lastName}" required />
        </div>

        <div class="field-group">
            <label>Correo Electrónico</label>
            <input type="email" th:field="*{email}" required />
        </div>

        <div class="field-group">
            <label>Teléfono</label>
            <input type="text" th:field="*{phone}" placeholder="999 999 999" />
        </div>

        <button type="submit" class="btn-save">Guardar Cambios</button>
        <a th:href="@{'/usuario/perfil/' + ${user.id}}" class="btn-cancel">Cancelar y volver</a>
    </form>
</div>

</body>
</html>
